<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NutriFit Pro</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <style>
        /* --- בסיס עיצוב פרימיום כהה עמוק --- */
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #090d16; color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .app-container { max-width: 420px; margin: 0 auto; padding: 16px; padding-bottom: 95px; box-sizing: border-box; }
        
        /* כרטיסיות ממוסגרות בגוון פחם */
        .premium-card { background-color: #111827; border: 1px solid #1f293d; border-radius: 14px; padding: 14px; margin-bottom: 12px; }
        
        /* שדות קלט כהים יוקרתיים */
        input, select {
            width: 100%; padding: 12px; margin: 8px 0 16px 0;
            background-color: #1f293d; border: 1px solid #374151;
            color: white; border-radius: 8px; box-sizing: border-box;
        }

        /* תפריט ניווט תחתון */
        .native-app-bottom-bar {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background-color: #111827; border-top: 1px solid #1f293d;
            display: flex; justify-content: space-around; padding: 10px 0;
            padding-bottom: env(safe-area-inset-bottom, 20px);
            z-index: 1000;
        }
        .nav-bar-item {
            display: flex; flex-direction: column; align-items: center;
            color: #9ca3af; cursor: pointer; flex: 1; transition: color 0.3s;
        }
        .nav-bar-item.active { color: #3b82f6; }
        .nav-bar-icon { font-size: 24px; margin-bottom: 4px; }
        .nav-bar-text { font-size: 12px; }
    </style>
</head>
<body>
    <div class="app-container">
        <h1 style="text-align: center; color: #3b82f6; margin-bottom: 20px;">NutriFit Pro</h1>
        
        <div id="main-content-area" hx-get="/tab/dashboard" hx-trigger="load"></div>
    </div>

    <div class="native-app-bottom-bar">
        <div hx-get="/tab/dashboard" hx-target="#main-content-area" class="nav-bar-item active" onclick="updateActive(this)">
            <span class="nav-bar-icon">📊</span><span class="nav-bar-text">דאשבורד</span>
        </div>
        <div hx-get="/tab/diary" hx-target="#main-content-area" class="nav-bar-item" onclick="updateActive(this)">
            <span class="nav-bar-icon">🍴</span><span class="nav-bar-text">תפריט</span>
        </div>
        <div hx-get="/tab/pantry" hx-target="#main-content-area" class="nav-bar-item" onclick="updateActive(this)">
            <span class="nav-bar-icon">🍏</span><span class="nav-bar-text">המזווה</span>
        </div>
        <div hx-get="/tab/profile" hx-target="#main-content-area" class="nav-bar-item" onclick="updateActive(this)">
            <span class="nav-bar-icon">👤</span><span class="nav-bar-text">פרופיל</span>
        </div>
    </div>

    <div id="modal-container"></div>

    <script>
        function updateActive(element) {
            document.querySelectorAll('.nav-bar-item').forEach(item => item.classList.remove('active'));
            element.classList.add('active');
        }
    </script>
</body>
</html>
