<div class="premium-card">
    <h2 style="margin-top:0; color: #3b82f6;">🍴 יומן תזונה ({{ selected_date }})</h2>
    
    <form hx-post="/diary/add" hx-target="#main-content-area" style="margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #1f293d;">
        <input type="hidden" name="selected_date" value="{{ selected_date }}">
        
        <label style="font-size: 0.9em; color: #9ca3af;">מה אכלת?</label>
        <input type="text" name="food_name" placeholder="שם המאכל (לדוגמה: חזה עוף)" required style="margin-bottom: 12px;">
        
        <div style="display: flex; gap: 10px;">
            <div style="flex: 1;">
                <label style="font-size: 0.9em; color: #9ca3af;">קלוריות</label>
                <input type="number" name="calories" placeholder="0" required>
            </div>
            <div style="flex: 1;">
                <label style="font-size: 0.9em; color: #9ca3af;">חלבון (גרם)</label>
                <input type="number" step="0.1" name="protein" placeholder="0" required>
            </div>
        </div>
        
        <button type="submit" style="background-color:#3b82f6; margin-top:10px; width: 100%; padding: 12px; border-radius: 8px; border: none; color: white; font-weight: bold; font-size: 16px; cursor: pointer;">
            ➕ הוסף ארוחה ליומן
        </button>
    </form>

    <h3 style="margin-top: 0; font-size: 1.1em; color: #e5e7eb;">מה אכלתי היום:</h3>
    {% if meals %}
        <ul style="list-style: none; padding: 0; margin: 0;">
        {% for meal in meals %}
            <li style="border-bottom: 1px solid #1f293d; padding: 12px 0;">
                <strong style="font-size: 1.1em;">{{ meal.food_name }}</strong><br>
                <span style="color: #9ca3af; font-size: 0.9em;">
                    <span style="color: #22c55e;">{{ meal.calories }} קל'</span> | 
                    <span style="color: #3b82f6;">{{ meal.protein }}ג' חלבון</span>
                </span>
            </li>
        {% endfor %}
        </ul>
    {% else %}
        <p style="color: #9ca3af; text-align: center; margin-top: 20px; font-style: italic;">לא הוזנו ארוחות בתאריך זה. זה הזמן לאכול משהו!</p>
    {% endif %}
</div>
